<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP4 FastStart 在线工具</title>
  <link rel="icon" href="data:," />
  <style>
    body {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      color: #111827;
    }

    h1 {
      margin-bottom: 8px;
    }

    input,
    button {
      margin: 8px 0;
      padding: 10px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    progress {
      width: 100%;
      height: 18px;
    }

    pre {
      max-height: 260px;
      overflow: auto;
      padding: 12px;
      background: #111827;
      color: #d1d5db;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    .hint {
      color: #6b7280;
      font-size: 14px;
    }

    .notice {
      margin: 16px 0;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #93c5fd;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: 14px;
    }

    .notice[hidden] {
      display: none;
    }

    .error {
      border-color: #f87171;
      background: #fef2f2;
      color: #991b1b;
    }

    a#downloadLink {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 6px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
    }

    a#downloadLink[hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <h1>MP4 FastStart 在线工具</h1>

  <p class="hint">
    在浏览器内通过 ffmpeg.wasm 把 MP4 重新封装为 FastStart 格式（<code>-c copy -movflags +faststart</code>），不会重新编码视频，文件不会上传到任何服务器。
  </p>

  <div id="compatNotice" class="notice" hidden></div>

  <input id="fileInput" type="file" accept="video/mp4,.mp4" />

  <div>
    <button id="loadButton" type="button">加载 FFmpeg 引擎</button>
    <button id="runButton" type="button" disabled>生成 FastStart MP4</button>
  </div>

  <progress id="progressBar" value="0" max="100"></progress>
  <p id="statusText">请先点击“加载 FFmpeg 引擎”，首次加载约 30MB，加载后会被浏览器缓存。</p>

  <a id="downloadLink" hidden>下载处理后的 MP4</a>

  <h3>日志</h3>
  <pre id="logBox"></pre>

  <p class="hint">
    技术实现：基于 <a href="https://github.com/ffmpegwasm/ffmpeg.wasm" target="_blank" rel="noopener">@ffmpeg/ffmpeg</a>，在浏览器内运行 FFmpeg WebAssembly 版本。
  </p>

  <script type="module" src="./faststart.js"></script>
</body>
</html>
